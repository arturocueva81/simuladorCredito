<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>
    <link rel="stylesheet" href="simulador.css">
    <script src="funciones.js" defer></script>
    <script src="simulador.js" defer></script>

</head>
<body>
    <div class="container">
    <div class="header-banco">
        <h1>Banco Futuro</h1>
        <p>Simulador de Crédito Personal</p>
    </div>

    <h2>Datos financieros</h2>

    <div class="input-group">
        <label for="txtIngresos">Ingresos:</label>
        <input type="number" id="txtIngresos" placeholder="Ej: 1000">
    </div>

    <div class="input-group">
        <label for="txtEgresos">Egresos:</label>
        <input type="number" id="txtEgresos" placeholder="Ej: 600">
    </div>

    <div class="result-box">
        <div class="result-item">Disponible: <span id="spnDisponible"></span></div>
        <div class="result-item">Capacidad de pago mensual: <span id="spnCapacidadPago"></span></div>
    </div>

    <h2>Solicitud de crédito</h2>

    <div class="input-group">
        <label for="txtMonto">Monto:</label>
        <input type="number" id="txtMonto" placeholder="Ej: 2000">
    </div>

    <div class="input-group">
        <label for="txtPlazo">Plazo en años:</label>
        <input type="number" id="txtPlazo" placeholder="Ej: 1">
    </div>

    <div class="input-group">
        <label for="txtTasaInteres">Tasa de interés:</label>
        <input type="number" id="txtTasaInteres" placeholder="Ej: 10">
    </div>

    <div class="result-box">
        <div class="result-item">Interés a pagar: <span id="spnInteresPagar"></span></div>
        <div class="result-item">Total préstamo: <span id="spnTotalPrestamo"></span></div>
        <div class="result-item">Cuota mensual: <span id="spnCuotaMensual"></span></div>
    </div>

    <p id="spnEstadoCredito">ANALIZANDO...</p>

    <div class="buttons">
        <button id="btnCalcularCredito">Calcular Crédito</button>
        <button id="btnReiniciar">Reiniciar</button>
    </div>
</div>
    

</body>
</html>
